<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notruf Sender</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
<style>
body { background:#111; color:white; font-family:sans-serif; padding:20px; }
button { padding:20px; border-radius:10px; background:#b30000; color:white; border:none; font-size:18px; }
select { width:100%; padding:12px; margin:10px 0; }
</style>
</head>
<body>
<h1>Notruf auslösen</h1>
<label>Abteilung</label>
<select id="ort">
<option>Zuschnitt</option>
<option>Schleiferei</option>
<option>ESG-Ofen</option>
<option>Forel</option>
</select>
<label>Notfall</label>
<select id="verletzung">
<option>Sturz</option>
<option>Schnitt / Blutung</option>
<option>Bewusstlosigkeit</option>
<option>Atemnot</option>
</select>
<button onclick="sende()">HILFE RUFEN</button>
<p id="status"></p>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDVFWBprRzsM_SbQ2kTVfOEu0KZF5K77x4",
  authDomain: "interner-notruf.firebaseapp.com",
  projectId: "interner-notruf",
  storageBucket: "interner-notruf.firebasestorage.app",
  messagingSenderId: "1012047231256",
  appId: "1:1012047231256:web:4ab44e4e95410f8255066d"
};
firebase.initializeApp(firebaseConfig);
async function sende() {
  const ort = document.getElementById("ort").value;
  const art = document.getElementById("verletzung").value;
  const zeit = new Date().toLocaleTimeString();
  const payload = {
    to: "/topics/notruf",
    notification: {
      title: "🚨 INTERNER NOTRUF",
      body: `Abteilung: ${ort}\nNotfall: ${art}\nZeit: ${zeit}`
    }
  };
  const fcmKey = "AAAA..."; // kommt gleich!
  document.getElementById("status").innerText = "Sende…";
  const res = await fetch("https://http://localhost:3000/send", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "key=" + fcmKey
    },
    body: JSON.stringify(payload)
  });
  document.getElementById("status").innerText = "Gesendet ✓";
}
</script>
</body>
</html>
